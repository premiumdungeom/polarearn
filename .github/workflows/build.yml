name: Build PolarEarn APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'

      - name: Create fresh Android project
        run: |
          flutter create --org com.polarearn --project-name polarearn /tmp/fresh_app
          rm -rf android
          cp -r /tmp/fresh_app/android .

      - name: Fix Kotlin version in settings.gradle
        run: |
          sed -i "s/id \"org.jetbrains.kotlin.android\" version \"[^\"]*\"/id \"org.jetbrains.kotlin.android\" version \"1.9.22\"/" android/settings.gradle
          cat android/settings.gradle

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: polarearn-apk
          path: build/app/outputs/flutter-apk/app-release.apk
